<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Maasai beadwork: diamonds, triangles, zigzags -->
  <defs>
    <style>
      .maasai-stroke { fill: none; stroke: currentColor; stroke-width: 1.2; }
      .maasai-fill { fill: currentColor; opacity: 0.3; }
    </style>
  </defs>
  <!-- Zigzag band top -->
  <polyline points="0,15 10,5 20,15 30,5 40,15 50,5 60,15 70,5 80,15 90,5 100,15" class="maasai-stroke"/>
  <polyline points="0,20 10,10 20,20 30,10 40,20 50,10 60,20 70,10 80,20 90,10 100,20" class="maasai-stroke"/>
  <!-- Diamond row -->
  <polygon points="15,40 25,30 35,40 25,50" class="maasai-stroke"/>
  <polygon points="21,40 25,34 29,40 25,46" class="maasai-fill"/>
  <polygon points="55,40 65,30 75,40 65,50" class="maasai-stroke"/>
  <polygon points="61,40 65,34 69,40 65,46" class="maasai-fill"/>
  <!-- Triangle row -->
  <polygon points="5,65 15,55 25,65" class="maasai-stroke"/>
  <polygon points="25,65 35,55 45,65" class="maasai-fill"/>
  <polygon points="45,65 55,55 65,65" class="maasai-stroke"/>
  <polygon points="65,65 75,55 85,65" class="maasai-fill"/>
  <!-- Zigzag band bottom -->
  <polyline points="0,80 10,70 20,80 30,70 40,80 50,70 60,80 70,70 80,80 90,70 100,80" class="maasai-stroke"/>
  <!-- Bead dots -->
  <circle cx="10" cy="90" r="2" class="maasai-fill"/>
  <circle cx="20" cy="90" r="2" class="maasai-fill"/>
  <circle cx="30" cy="90" r="2" class="maasai-fill"/>
  <circle cx="40" cy="90" r="2" class="maasai-fill"/>
  <circle cx="50" cy="90" r="2" class="maasai-fill"/>
  <circle cx="60" cy="90" r="2" class="maasai-fill"/>
  <circle cx="70" cy="90" r="2" class="maasai-fill"/>
  <circle cx="80" cy="90" r="2" class="maasai-fill"/>
  <circle cx="90" cy="90" r="2" class="maasai-fill"/>
  <!-- Horizontal lines between -->
  <line x1="0" y1="25" x2="100" y2="25" class="maasai-stroke"/>
  <line x1="0" y1="75" x2="100" y2="75" class="maasai-stroke"/>
</svg>
