<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kente: interlocking rectangular blocks in weaving style -->
  <defs>
    <style>
      .kente-stroke { fill: none; stroke: currentColor; stroke-width: 1; }
      .kente-fill { fill: currentColor; opacity: 0.25; }
      .kente-fill-dark { fill: currentColor; opacity: 0.4; }
    </style>
  </defs>
  <!-- Horizontal weft bands -->
  <rect x="0" y="0" width="100" height="20" class="kente-stroke"/>
  <rect x="0" y="20" width="100" height="20" class="kente-stroke"/>
  <rect x="0" y="40" width="100" height="20" class="kente-stroke"/>
  <rect x="0" y="60" width="100" height="20" class="kente-stroke"/>
  <rect x="0" y="80" width="100" height="20" class="kente-stroke"/>
  <!-- Vertical warp blocks — offset per row -->
  <rect x="5" y="2" width="15" height="16" class="kente-fill"/>
  <rect x="30" y="2" width="15" height="16" class="kente-fill-dark"/>
  <rect x="55" y="2" width="15" height="16" class="kente-fill"/>
  <rect x="80" y="2" width="15" height="16" class="kente-fill-dark"/>
  <!-- Row 2 offset -->
  <rect x="15" y="22" width="15" height="16" class="kente-fill-dark"/>
  <rect x="40" y="22" width="15" height="16" class="kente-fill"/>
  <rect x="65" y="22" width="15" height="16" class="kente-fill-dark"/>
  <rect x="90" y="22" width="10" height="16" class="kente-fill"/>
  <!-- Row 3 -->
  <rect x="5" y="42" width="15" height="16" class="kente-fill"/>
  <rect x="30" y="42" width="15" height="16" class="kente-fill-dark"/>
  <rect x="55" y="42" width="15" height="16" class="kente-fill"/>
  <rect x="80" y="42" width="15" height="16" class="kente-fill-dark"/>
  <!-- Row 4 offset -->
  <rect x="15" y="62" width="15" height="16" class="kente-fill-dark"/>
  <rect x="40" y="62" width="15" height="16" class="kente-fill"/>
  <rect x="65" y="62" width="15" height="16" class="kente-fill-dark"/>
  <rect x="90" y="62" width="10" height="16" class="kente-fill"/>
  <!-- Row 5 -->
  <rect x="5" y="82" width="15" height="16" class="kente-fill"/>
  <rect x="30" y="82" width="15" height="16" class="kente-fill-dark"/>
  <rect x="55" y="82" width="15" height="16" class="kente-fill"/>
  <rect x="80" y="82" width="15" height="16" class="kente-fill-dark"/>
  <!-- Cross-hatch detail lines -->
  <line x1="0" y1="10" x2="100" y2="10" class="kente-stroke" stroke-dasharray="3,5"/>
  <line x1="0" y1="50" x2="100" y2="50" class="kente-stroke" stroke-dasharray="3,5"/>
  <line x1="0" y1="90" x2="100" y2="90" class="kente-stroke" stroke-dasharray="3,5"/>
</svg>
