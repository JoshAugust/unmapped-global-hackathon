<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Madhubani: line-art botanical/geometric motifs -->
  <defs>
    <style>
      .madhu-stroke { fill: none; stroke: currentColor; stroke-width: 1; }
      .madhu-thin { fill: none; stroke: currentColor; stroke-width: 0.6; }
      .madhu-fill { fill: currentColor; opacity: 0.2; }
    </style>
  </defs>
  <!-- Central lotus/flower -->
  <ellipse cx="50" cy="50" rx="8" ry="12" class="madhu-stroke"/>
  <ellipse cx="50" cy="50" rx="12" ry="8" class="madhu-stroke"/>
  <circle cx="50" cy="50" r="4" class="madhu-fill"/>
  <!-- Petals -->
  <path d="M50,35 Q55,25 50,15" class="madhu-stroke"/>
  <path d="M50,35 Q45,25 50,15" class="madhu-stroke"/>
  <path d="M50,65 Q55,75 50,85" class="madhu-stroke"/>
  <path d="M50,65 Q45,75 50,85" class="madhu-stroke"/>
  <path d="M38,50 Q28,45 18,50" class="madhu-stroke"/>
  <path d="M38,50 Q28,55 18,50" class="madhu-stroke"/>
  <path d="M62,50 Q72,45 82,50" class="madhu-stroke"/>
  <path d="M62,50 Q72,55 82,50" class="madhu-stroke"/>
  <!-- Corner leaf motifs -->
  <path d="M5,5 Q15,10 10,20" class="madhu-thin"/>
  <path d="M5,5 Q10,15 20,10" class="madhu-thin"/>
  <line x1="5" y1="5" x2="12" y2="12" class="madhu-thin"/>
  <path d="M95,5 Q85,10 90,20" class="madhu-thin"/>
  <path d="M95,5 Q90,15 80,10" class="madhu-thin"/>
  <path d="M5,95 Q15,90 10,80" class="madhu-thin"/>
  <path d="M5,95 Q10,85 20,90" class="madhu-thin"/>
  <path d="M95,95 Q85,90 90,80" class="madhu-thin"/>
  <path d="M95,95 Q90,85 80,90" class="madhu-thin"/>
  <!-- Dot border -->
  <circle cx="50" cy="2" r="1" class="madhu-fill"/>
  <circle cx="50" cy="98" r="1" class="madhu-fill"/>
  <circle cx="2" cy="50" r="1" class="madhu-fill"/>
  <circle cx="98" cy="50" r="1" class="madhu-fill"/>
  <!-- Fine concentric decoration -->
  <circle cx="50" cy="50" r="18" class="madhu-thin"/>
  <circle cx="50" cy="50" r="22" class="madhu-thin" stroke-dasharray="2,3"/>
</svg>
