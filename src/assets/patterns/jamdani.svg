<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <pattern id="jamdani" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Jamdani geometric diamond/rhombus weave pattern -->
      <rect width="60" height="60" fill="none"/>
      <!-- Central diamond -->
      <polygon points="30,5 55,30 30,55 5,30" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
      <!-- Inner diamond -->
      <polygon points="30,15 45,30 30,45 15,30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
      <!-- Cross lines through center -->
      <line x1="30" y1="0" x2="30" y2="60" stroke="currentColor" stroke-width="0.3" opacity="0.3"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="currentColor" stroke-width="0.3" opacity="0.3"/>
      <!-- Corner accents -->
      <circle cx="30" cy="30" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="30" cy="5" r="1" fill="currentColor" opacity="0.3"/>
      <circle cx="55" cy="30" r="1" fill="currentColor" opacity="0.3"/>
      <circle cx="30" cy="55" r="1" fill="currentColor" opacity="0.3"/>
      <circle cx="5" cy="30" r="1" fill="currentColor" opacity="0.3"/>
      <!-- Small diagonal weave marks -->
      <line x1="15" y1="15" x2="20" y2="20" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
      <line x1="40" y1="15" x2="45" y2="20" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
      <line x1="15" y1="45" x2="20" y2="40" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
      <line x1="40" y1="45" x2="45" y2="40" stroke="currentColor" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="60" height="60" fill="url(#jamdani)"/>
</svg>
