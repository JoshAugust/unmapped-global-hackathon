<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Imigongo: bold geometric cow-dung art — spirals, checkerboards -->
  <defs>
    <style>
      .imi-stroke { fill: none; stroke: currentColor; stroke-width: 1.5; }
      .imi-fill { fill: currentColor; opacity: 0.35; }
      .imi-fill-light { fill: currentColor; opacity: 0.15; }
    </style>
  </defs>
  <!-- Checkerboard quadrant top-left -->
  <rect x="0" y="0" width="10" height="10" class="imi-fill"/>
  <rect x="20" y="0" width="10" height="10" class="imi-fill"/>
  <rect x="10" y="10" width="10" height="10" class="imi-fill"/>
  <rect x="0" y="20" width="10" height="10" class="imi-fill"/>
  <rect x="20" y="20" width="10" height="10" class="imi-fill"/>
  <rect x="10" y="0" width="10" height="10" class="imi-fill-light"/>
  <rect x="0" y="10" width="10" height="10" class="imi-fill-light"/>
  <rect x="20" y="10" width="10" height="10" class="imi-fill-light"/>
  <rect x="10" y="20" width="10" height="10" class="imi-fill-light"/>
  <!-- Bold spiral center -->
  <path d="M50,50 C50,44 44,40 40,44 C36,48 40,56 48,56 C58,56 62,46 58,38 C54,28 40,26 34,36" class="imi-stroke"/>
  <!-- Bold spiral right -->
  <path d="M85,50 C85,46 81,43 78,46 C75,49 78,55 83,55 C90,55 93,48 90,42" class="imi-stroke"/>
  <!-- Concentric diamonds bottom -->
  <polygon points="50,75 65,90 50,105 35,90" class="imi-stroke"/>
  <polygon points="50,80 60,90 50,100 40,90" class="imi-stroke"/>
  <polygon points="50,85 55,90 50,95 45,90" class="imi-fill"/>
  <!-- Bold lines -->
  <line x1="0" y1="35" x2="30" y2="35" class="imi-stroke"/>
  <line x1="70" y1="35" x2="100" y2="35" class="imi-stroke"/>
  <line x1="0" y1="65" x2="30" y2="65" class="imi-stroke"/>
  <line x1="70" y1="65" x2="100" y2="65" class="imi-stroke"/>
  <!-- Triangles top-right -->
  <polygon points="75,5 85,20 65,20" class="imi-fill"/>
  <polygon points="90,5 100,20 80,20" class="imi-fill-light"/>
</svg>
